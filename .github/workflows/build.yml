name: Build APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'flutter or android'
        required: true
        default: 'flutter'
      user_id:
        description: 'Telegram user ID'
        required: true
      chat_id:
        description: 'Telegram chat ID'
        required: true

jobs:
  build-flutter:
    if: ${{ github.event.inputs.build_type == 'flutter' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: 'stable'
          cache: true

      - name: Extract project ZIP
        run: |
          mkdir -p project
          ZIP_FILE=$(find uploads/ -name "*.zip" | head -1)
          if [ -z "$ZIP_FILE" ]; then
            echo "ERROR: Tidak ada file ZIP di folder uploads/"
            exit 1
          fi
          echo "Mengekstrak: $ZIP_FILE"
          unzip -o "$ZIP_FILE" -d project/
          ENTRIES=$(ls project/ | wc -l)
          if [ "$ENTRIES" -eq 1 ]; then
            SUBDIR=$(ls project/)
            if [ -d "project/$SUBDIR" ]; then
              mv project/$SUBDIR/* project/ 2>/dev/null || true
              mv project/$SUBDIR/.* project/ 2>/dev/null || true
              rmdir project/$SUBDIR 2>/dev/null || true
            fi
          fi
          ls -la project/

      - name: Validate Flutter project
        run: |
          if [ ! -f "project/pubspec.yaml" ]; then
            echo "ERROR: pubspec.yaml tidak ditemukan!"
            exit 1
          fi
          echo "OK: pubspec.yaml ditemukan"

      - name: Flutter pub get
        working-directory: project
        run: flutter pub get

      - name: Build Flutter APK Release
        working-directory: project
        run: flutter build apk --release --no-pub

      - name: Find and copy APK
        run: |
          APK=$(find project/build -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: APK tidak ditemukan setelah build"
            exit 1
          fi
          echo "APK ditemukan: $APK"
          mkdir -p apk-out
          cp "$APK" apk-out/

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-output
          path: apk-out/*.apk
          retention-days: 1

  build-android:
    if: ${{ github.event.inputs.build_type == 'android' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Extract project ZIP
        run: |
          mkdir -p project
          ZIP_FILE=$(find uploads/ -name "*.zip" | head -1)
          if [ -z "$ZIP_FILE" ]; then
            echo "ERROR: Tidak ada ZIP di uploads/"
            exit 1
          fi
          unzip -o "$ZIP_FILE" -d project/
          ENTRIES=$(ls project/ | wc -l)
          if [ "$ENTRIES" -eq 1 ]; then
            SUBDIR=$(ls project/)
            if [ -d "project/$SUBDIR" ]; then
              mv project/$SUBDIR/* project/ 2>/dev/null || true
              rmdir project/$SUBDIR 2>/dev/null || true
            fi
          fi
          ls -la project/

      - name: Validate Android project
        run: |
          if [ ! -f "project/build.gradle" ] && [ ! -f "project/build.gradle.kts" ]; then
            echo "ERROR: build.gradle tidak ditemukan!"
            exit 1
          fi
          echo "OK: build.gradle ditemukan"

      - name: Make gradlew executable
        working-directory: project
        run: chmod +x gradlew

      - name: Build Android APK Release
        working-directory: project
        run: ./gradlew assembleRelease --no-daemon

      - name: Find and copy APK
        run: |
          APK=$(find project/app/build/outputs/apk -name "*.apk" | head -1)
          if [ -z "$APK" ]; then
            APK=$(find project/build -name "*.apk" | head -1)
          fi
          if [ -z "$APK" ]; then
            echo "ERROR: APK tidak ditemukan"
            exit 1
          fi
          mkdir -p apk-out
          cp "$APK" apk-out/

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-output
          path: apk-out/*.apk
          retention-days: 1
